<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-toe </title>
    <style>
        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
           background-image: linear-gradient(to right, rgba(255,0,0,0), rgba(255,0,0,1));
}
    h1{
        position:absolute;
        top:20px;
        color:black;
    }    

        div{
            
            border:1px solid black;
            padding:20px;
            margin:20px;  
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);

        }.container{
            width:400px;
            height:400px;
            border:1px solid black;
            border-radius:5px;
            display:grid;
            grid-template-columns:repeat(3,1fr);
            grid-template-rows:repeat(3,1fr);
            column-gap:10px;
            align-items: space-around;
            background-color: white;
            position:absolute;
            inset:0;
            margin:auto;
        }
        .cell{
            padding:40px 20px;
            border:1px solid black;
            display:flex;
            justify-content:center;
            align-items:space around;
            font-size:4rem;
            border-radius:10px;
           

        }
        button{
            padding:10px 20px;
            font-size:1rem;
            cursor:pointer;
            text-align:center;
            transition: background-color 1s ease;
            background-color:#040504;
            color:white;
            border:none;
            border-radius:5px;
            position: absolute;
            bottom: 50px;

        }
        button:hover{
            background-color:#000000;
            transform:scale(1.1);
        }
</style>
</head>
<body>
    <h1>Tic-Tac-Toe Game</h1>
    <div class="container">
        
         <div class="cell"></div>
         <div class="cell"></div>
         <div class="cell"></div>
         <div class="cell"></div>
         <div class="cell"></div>
         <div class="cell"></div>
         <div class="cell"></div>
         <div class="cell"></div>
         <div class="cell"></div>
        
        
    </div>
    <button onclick="resetGame()">Reset Game</button>
    
</body>
</html>
