<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <script>
        function myFunction(){
            document.getElementById("demo").innerHTML="Hola coders";
        }
        document.getElementById("example").innerHTML="Molly";
    </script>
</head>
<body>
    <h2>what can javascript do?</h2>
    <p id="demo">A paragraph</p>
    <button type="button" onclick="myFunction()">Click me</button>

    <p class="example"></p>
    
</body>
</html>
