<!--find the max number-->
<script>
    function findMax(){
        let max = - Infinity;
        for (let i = 0; i<arguments.length; i++){
            if (arguments[i] > max ){
                max = arguments[i];
            }
        }
        return max;

    }
    document.getElementById("demo").innerHTML = findMax(4,5,6,7,8);
</script>

<!--find the sum of all numbers-->
<script>
    function findSum(){
        let sum = 0;
        for (let i = 0; i<arguments.length; i ++){
            sum += arguments[i];
        }
        return sum;
    }
    document.getElementById("demo").innerHTML = findSum(1,2,3);
</script>

<!--rest (...)parameters The rest parameter (...) allows a function to treat an indefinite number of arguments as an array:-->
<script>
    function sum(...args){
        let sum = 0;
        for(let arg of args) sum += arg;
        return sum ;
    }
    let x = sum(4, 9, 45, 23, 74, 124);
document.getElementById("demo").innerHTML = x;
</script>
