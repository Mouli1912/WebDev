<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>What can Javascript do</h1>
    <p id="demo">Javascript can change the HTML content </p>

    <button type="button" onclick='document.getElementById("demo").innerHTML="Hola coders"'>click me </button>
    <button type="button" onclick='document.getElementById("demo").style.fontSize="35px"'>increase font size</button>
    <button type="button" onclick='document.getElementById("demo").style.display="none"'>hide </button>
    <button type="button" onclick='document.getElementById("demo").style.display="block"'>show </button>

</body>
</html>
