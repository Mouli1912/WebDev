<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>JavaScript Operators</h1>

    <p id="result"></p>
    <p id="demo"></p>
    <p id="demo1"></p>
<script>
    let x = 10;
    let y = 5;
    let z = x+y;
    let p = x * y;
    document.getElementById("result").innerHTML = "the sum of x + y is " + z;
    document.getElementById("result").innerHTML = "the product of x * y is " + p;
</script>

<script>
    text = "Hello" + " " + "World!";
    document.getElementById("demo").innerHTML = text;
</script>
<script>
    let a = 10;
    let b = 5;
    let c = a - b;
    let d = a / b;
    document.getElementById("demo1").innerHTML = "the difference of a - b is " + c;
    document.getElementById("demo1").innerHTML = "the quotient of a / b is " + d;
</script>

</body>
</html>
