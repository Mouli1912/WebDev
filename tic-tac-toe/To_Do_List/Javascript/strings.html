<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>strings</title>
</head>
<body>
    <h1>Javascript Strings</h1>
    <p id = "demo"></p>

    <script>
        let carName1 = "Volvo XC60";
        let carName2 = "Toyota Corolla";
        document.getElementById("demo").innerHTML = carName1 + " " + carName2;
    </script>

    <script>
        let answer1  = "it's alright";
        let answer2 = "he is called 'Johnny'";
        let answer3 = 'he is called "Jonhny"';
        document.getElementById("demo").innerHTML = answer1 + "<br>" + answer2 + "<br>" + answer3;
        </script>

        <script>
            let templateText = `he's often called "jonnhy"`;
            document.getElementById("demo").innerHTML = templateText;
        </script>

       <script>
        let text2 = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";

        document.getElementById("demo").innerHTML = text2.length;
    </script>
<script>
    let text = "Hello World!";
    let char = text.charAt(0);
    document.getElementById("demo").innerHTML = text.charAt(0);
    document.getElementById("demo").innerHTML = text.charCodeAt(0);
    document.getElementById("demo").innerHTML = text.charPointAt(0);

</script>

<script>
    const name = "w3schools";
    let letter = name.at(2);
    document.getElementById("demo").innerHTML =letter;
</script>
</body>
</html>
