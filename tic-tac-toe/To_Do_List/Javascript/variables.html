<html>

<body>

  <h2>Redeclaring a Variable Using var</h2>

  <p id="demo"></p>
  <p class="example"></p>
  <p class="ex"></p>
  <p class="array"></p>

  <script>
    var x = 10;
    // Here x is 10

    {
      var x = 2;
      // Here x is 2
    }

    // Here x is 2
    document.getElementById("demo").innerHTML = x;

    carName = "Volvo";
    document.getElementsByClassName("example")[0].innerHTML = carName;
    var carName;

  </script>

  <script>
    try {
      const PI = 3.141592653589793;
      PI = 3.14;
    }
    catch (err) {
      document.getElementsByClassName("ex").innerHTML = err;
    }
  </script>

  <script>
    // Create an Array:
    const cars = ["Saab", "Volvo", "BMW"];

    // Change an element:
    cars[0] = "Toyota";

    // Add an element:
    cars.push("Audi");

    // Display the Array:
    document.getElementById("demo").innerHTML = cars;

  </script>


  <h1>JavaScript typeof Operator</h1>
  <h2>JavaScript typeof Operator</h2>
  <p>The typeof operator returns the type of a variable or an expression</p>
  <script>
    document.getElementById("demo").innerHTML = typeof "" + "<br>" + typeof "John" + "<br>" + typeof "John Doe";
  </script>
